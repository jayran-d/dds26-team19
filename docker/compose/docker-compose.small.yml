name: dds-small

x-http-healthcheck: &http-healthcheck
  test:
    - CMD
    - python
    - -c
    - import socket; s = socket.create_connection(("127.0.0.1", 5000), 2); s.close()
  interval: 5s
  timeout: 3s
  retries: 20
  start_period: 5s

x-redis-healthcheck: &redis-healthcheck
  test: ["CMD-SHELL", "redis-cli -a redis ping | grep PONG"]
  interval: 5s
  timeout: 5s
  retries: 10
  start_period: 5s

x-nofile-ulimits: &nofile-ulimits
  nofile:
    soft: 65536
    hard: 65536

x-order-service-base: &order-service-base
  image: order:latest
  restart: unless-stopped
  environment:
    - GATEWAY_URL=http://gateway:80
    - STOCK_REDIS_HOST=stock-db
    - STOCK_REDIS_PORT=6379
    - STOCK_REDIS_PASSWORD=redis
    - STOCK_REDIS_DB=0
    - STOCK_REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
    - STOCK_REDIS_MASTER_NAME=stock-db
    - PAYMENT_REDIS_HOST=payment-db
    - PAYMENT_REDIS_PORT=6379
    - PAYMENT_REDIS_PASSWORD=redis
    - PAYMENT_REDIS_DB=0
    - PAYMENT_REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
    - PAYMENT_REDIS_MASTER_NAME=payment-db
    - CONSUMER_WORKERS=8
    - STREAM_BATCH_SIZE=32
    - TRANSACTION_MODE=${TRANSACTION_MODE:-saga}
    - VERBOSE_LOGS=${VERBOSE_LOGS:-false}
  command: >-
    sh -lc '
    if [ "$$VERBOSE_LOGS" = "true" ]; then
      exec hypercorn -b 0.0.0.0:5000 -w 1 --backlog 4096 --graceful-timeout 30 --keep-alive 75 --log-level debug --access-logfile - app:app;
    else
      exec hypercorn -b 0.0.0.0:5000 -w 1 --backlog 4096 --graceful-timeout 30 --keep-alive 75 --log-level info app:app;
    fi'
  env_file:
    - ../../env/order_redis.env
  ulimits: *nofile-ulimits
  healthcheck: *http-healthcheck
  depends_on:
    order-db:
      condition: service_healthy
    order-db-replica:
      condition: service_healthy
    stock-db:
      condition: service_healthy
    stock-db-replica:
      condition: service_healthy
    payment-db:
      condition: service_healthy
    payment-db-replica:
      condition: service_healthy
    redis-sentinel-1:
      condition: service_healthy
    redis-sentinel-2:
      condition: service_healthy
    redis-sentinel-3:
      condition: service_healthy

x-stock-service-base: &stock-service-base
  image: stock:latest
  restart: unless-stopped
  environment:
    - CONSUMER_WORKERS=8
    - STREAM_BATCH_SIZE=32
    - VERBOSE_LOGS=${VERBOSE_LOGS:-false}
    - TRANSACTION_MODE=${TRANSACTION_MODE:-saga}
  command: >-
    sh -lc '
    if [ "$$VERBOSE_LOGS" = "true" ]; then
      exec gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=debug --access-logfile - app:app;
    else
      exec gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app;
    fi'
  env_file:
    - ../../env/stock_redis.env
  ulimits: *nofile-ulimits
  healthcheck: *http-healthcheck
  depends_on:
    stock-db:
      condition: service_healthy
    stock-db-replica:
      condition: service_healthy
    redis-sentinel-1:
      condition: service_healthy
    redis-sentinel-2:
      condition: service_healthy
    redis-sentinel-3:
      condition: service_healthy

x-payment-service-base: &payment-service-base
  image: payment:latest
  restart: unless-stopped
  environment:
    - CONSUMER_WORKERS=8
    - STREAM_BATCH_SIZE=32
    - VERBOSE_LOGS=${VERBOSE_LOGS:-false}
    - TRANSACTION_MODE=${TRANSACTION_MODE:-saga}
  command: >-
    sh -lc '
    if [ "$$VERBOSE_LOGS" = "true" ]; then
      exec gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=debug --access-logfile - app:app;
    else
      exec gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app;
    fi'
  env_file:
    - ../../env/payment_redis.env
  ulimits: *nofile-ulimits
  healthcheck: *http-healthcheck
  depends_on:
    payment-db:
      condition: service_healthy
    payment-db-replica:
      condition: service_healthy
    redis-sentinel-1:
      condition: service_healthy
    redis-sentinel-2:
      condition: service_healthy
    redis-sentinel-3:
      condition: service_healthy

x-redis-server-base: &redis-server-base
  image: redis:7.2-bookworm
  restart: unless-stopped
  healthcheck: *redis-healthcheck

x-redis-primary-base: &redis-primary-base
  <<: *redis-server-base
  command: >-
    redis-server --requirepass redis --maxmemory 512mb
    --appendonly yes --appendfsync everysec
    --save ""
    --auto-aof-rewrite-min-size 256mb
    --auto-aof-rewrite-percentage 200
    --dir /data

x-redis-replica-base: &redis-replica-base
  <<: *redis-server-base
  command: >-
    sh -lc '
    exec redis-server
    --requirepass redis
    --masterauth redis
    --replicaof "$$REDIS_PRIMARY_HOST" 6379
    --maxmemory 512mb
    --appendonly yes
    --appendfsync everysec
    --save ""
    --auto-aof-rewrite-min-size 256mb
    --auto-aof-rewrite-percentage 200
    --dir /data'

x-redis-sentinel-base: &redis-sentinel-base
  image: redis:7.2-bookworm
  restart: unless-stopped
  command: >-
    sh -lc '
    printf "%s\n"
    "port 26379"
    "bind 0.0.0.0"
    "protected-mode no"
    "dir /tmp"
    "sentinel resolve-hostnames yes"
    "sentinel announce-hostnames yes"
    "sentinel monitor order-db order-db 6379 2"
    "sentinel auth-pass order-db redis"
    "sentinel down-after-milliseconds order-db 5000"
    "sentinel failover-timeout order-db 15000"
    "sentinel parallel-syncs order-db 1"
    "sentinel monitor stock-db stock-db 6379 2"
    "sentinel auth-pass stock-db redis"
    "sentinel down-after-milliseconds stock-db 5000"
    "sentinel failover-timeout stock-db 15000"
    "sentinel parallel-syncs stock-db 1"
    "sentinel monitor payment-db payment-db 6379 2"
    "sentinel auth-pass payment-db redis"
    "sentinel down-after-milliseconds payment-db 5000"
    "sentinel failover-timeout payment-db 15000"
    "sentinel parallel-syncs payment-db 1"
    >/tmp/sentinel.conf &&
    exec redis-server /tmp/sentinel.conf --sentinel'
  healthcheck:
    test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep PONG"]
  depends_on:
    order-db:
      condition: service_healthy
    order-db-replica:
      condition: service_healthy
    stock-db:
      condition: service_healthy
    stock-db-replica:
      condition: service_healthy
    payment-db:
      condition: service_healthy
    payment-db-replica:
      condition: service_healthy

services:
  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    volumes:
      - ../../nginx/gateway_nginx.small.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    ulimits: *nofile-ulimits
    depends_on:
      order-service:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      order-service-3:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  order-service:
    <<: *order-service-base
    build:
      context: ../..
      dockerfile: order/Dockerfile

  order-service-2:
    <<: *order-service-base

  order-service-3:
    <<: *order-service-base

  order-db:
    <<: *redis-primary-base
    volumes:
      - order-db-data:/data

  order-db-replica:
    <<: *redis-replica-base
    environment:
      - REDIS_PRIMARY_HOST=order-db
    volumes:
      - order-db-replica-data:/data

  stock-service:
    <<: *stock-service-base
    build:
      context: ../..
      dockerfile: stock/Dockerfile

  stock-db:
    <<: *redis-primary-base
    volumes:
      - stock-db-data:/data

  stock-db-replica:
    <<: *redis-replica-base
    environment:
      - REDIS_PRIMARY_HOST=stock-db
    volumes:
      - stock-db-replica-data:/data

  payment-service:
    <<: *payment-service-base
    build:
      context: ../..
      dockerfile: payment/Dockerfile

  payment-db:
    <<: *redis-primary-base
    volumes:
      - payment-db-data:/data

  payment-db-replica:
    <<: *redis-replica-base
    environment:
      - REDIS_PRIMARY_HOST=payment-db
    volumes:
      - payment-db-replica-data:/data

  redis-sentinel-1:
    <<: *redis-sentinel-base

  redis-sentinel-2:
    <<: *redis-sentinel-base

  redis-sentinel-3:
    <<: *redis-sentinel-base

volumes:
  order-db-data:
  order-db-replica-data:
  stock-db-data:
  stock-db-replica-data:
  payment-db-data:
  payment-db-replica-data:
