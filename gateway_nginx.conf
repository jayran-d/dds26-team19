worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 16384;
    multi_accept on;
}

http {
    # Single stateless ingress for the local Compose deployment.
    # Upstream names are resolved when nginx starts, so backend container
    # recreation can still require a gateway restart to refresh IPs.
    upstream order_service_upstream {
        server order-service:5000;
        keepalive 512;
    }

    upstream payment_service_upstream {
        server payment-service:5000;
        keepalive 128;
    }

    upstream stock_service_upstream {
        server stock-service:5000;
        keepalive 128;
    }

    server {
        listen 80;

        location /orders/ {
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass http://order_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            # Checkout requests can stay open while the order service polls
            # orchestrator-owned status until the transaction reaches a terminal state.
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /payment/ {
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_pass http://payment_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /stock/ {
            rewrite ^/stock/(.*)$ /$1 break;
            proxy_pass http://stock_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        access_log off;
    }

    access_log off;
}
