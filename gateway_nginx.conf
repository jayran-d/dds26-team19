worker_rlimit_nofile 65536;

events {
    worker_connections 16384;
}

http {
    resolver 127.0.0.11 ipv6=off valid=5s;

    server {
        listen 80;

        location /orders/ {
            set $order_upstream order-service:5000;
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass http://$order_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /payment/ {
            set $payment_upstream payment-service:5000;
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_pass http://$payment_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /stock/ {
            set $stock_upstream stock-service:5000;
            rewrite ^/stock/(.*)$ /$1 break;
            proxy_pass http://$stock_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        access_log off;
    }

    access_log off;
}
