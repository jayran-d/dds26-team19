services:

  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: unless-stopped
    environment:
      - GATEWAY_URL=http://gateway:80
      - STOCK_REDIS_HOST=stock-db
      - STOCK_REDIS_PORT=6379
      - STOCK_REDIS_PASSWORD=redis
      - STOCK_REDIS_DB=0
      - PAYMENT_REDIS_HOST=payment-db
      - PAYMENT_REDIS_PORT=6379
      - PAYMENT_REDIS_PASSWORD=redis
      - PAYMENT_REDIS_DB=0
      - CONSUMER_WORKERS=4
    command: gunicorn -b 0.0.0.0:5000 -k gthread --threads 64 -w 1 --timeout 90 --log-level=info app:app
    env_file:
      - env/order_redis.env
      - env/transaction.env
    depends_on:
      order-db:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      payment-db:
        condition: service_healthy

  order-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes --appendfsync everysec --dir /data
    volumes:
      - order-db-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    restart: unless-stopped
    environment:
      - CONSUMER_WORKERS=4
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
      - env/transaction.env
    depends_on:
      stock-db:
        condition: service_healthy

  stock-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes --appendfsync everysec --dir /data
    volumes:
      - stock-db-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: user:latest
    restart: unless-stopped
    environment:
      - CONSUMER_WORKERS=4
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
      - env/transaction.env
    depends_on:
      payment-db:
        condition: service_healthy

  payment-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes --appendfsync everysec --dir /data
    volumes:
      - payment-db-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  order-db-data:
  stock-db-data:
  payment-db-data:
