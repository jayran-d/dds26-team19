services:

  # Single ingress container for local development.
  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      order-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      orchestrator-service:
        condition: service_healthy

  # Extracted coordinator: owns Saga records, 2PC state, timeout handling,
  # and recovery logic outside of order-service.
  orchestrator-service:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    image: orchestrator:latest
    restart: unless-stopped
    environment:
      - ORDER_REDIS_HOST=order-db
      - ORDER_REDIS_PORT=6379
      - ORDER_REDIS_PASSWORD=redis
      - ORDER_REDIS_DB=0
      - STOCK_REDIS_HOST=stock-db
      - STOCK_REDIS_PORT=6379
      - STOCK_REDIS_PASSWORD=redis
      - STOCK_REDIS_DB=0
      - PAYMENT_REDIS_HOST=payment-db
      - PAYMENT_REDIS_PORT=6379
      - PAYMENT_REDIS_PASSWORD=redis
      - PAYMENT_REDIS_DB=0
      - CONSUMER_WORKERS=8
      - STREAM_BATCH_SIZE=32
      - VERBOSE_LOGS=${VERBOSE_LOGS:-false}
    command: >-
      sh -lc '
      if [ "$$VERBOSE_LOGS" = "true" ]; then
        exec gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=debug --access-logfile - app:app;
      else
        exec gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app;
      fi'
    env_file:
      - env/orchestrator_redis.env
      - env/transaction.env
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s = socket.create_connection(("127.0.0.1", 5000), 2); s.close()
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      orchestrator-db:
        condition: service_healthy
      order-db:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      payment-db:
        condition: service_healthy

  # Thin external API facade: owns order data, but no longer coordinates
  # distributed transactions directly.
  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: unless-stopped
    environment:
      - GATEWAY_URL=http://gateway:80
      - ORCHESTRATOR_URL=http://orchestrator-service:5000
      - VERBOSE_LOGS=${VERBOSE_LOGS:-false}
    command: >-
      sh -lc '
      if [ "$$VERBOSE_LOGS" = "true" ]; then
        exec hypercorn -b 0.0.0.0:5000 -w 1 --graceful-timeout 30 --log-level debug --access-logfile - app:app;
      else
        exec hypercorn -b 0.0.0.0:5000 -w 1 --graceful-timeout 30 --log-level info app:app;
      fi'
    env_file:
      - env/order_redis.env
      - env/transaction.env
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s = socket.create_connection(("127.0.0.1", 5000), 2); s.close()
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      order-db:
        condition: service_healthy
      orchestrator-service:
        condition: service_healthy

  order-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    # AOF everysec gives durable writes without full fsync-on-every-write cost.
    command: >-
      redis-server --requirepass redis --maxmemory 512mb
      --appendonly yes --appendfsync everysec
      --save ""
      --auto-aof-rewrite-min-size 256mb
      --auto-aof-rewrite-percentage 200
      --dir /data
    volumes:
      - order-db-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  orchestrator-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: >-
      redis-server --requirepass redis --maxmemory 512mb
      --appendonly yes --appendfsync everysec
