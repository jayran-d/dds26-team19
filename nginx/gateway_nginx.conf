worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 16384;
    multi_accept on;
}

http {
    keepalive_timeout 30s;
    keepalive_requests 10000;

    upstream order_service_upstream {
        server order-service:5000;
        keepalive 64;
    }

    upstream payment_service_upstream {
        server payment-service:5000;
        keepalive 64;
    }

    upstream stock_service_upstream {
        server stock-service:5000;
        keepalive 64;
    }

    server {
        listen 80;

        location /orders/checkout/ {
            proxy_pass http://order_service_upstream/checkout/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 90s;
            proxy_next_upstream off;
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @checkout_unavailable;
        }

        location /orders/ {
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass http://order_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            proxy_next_upstream off;
        }

        location /payment/ {
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_pass http://payment_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            proxy_next_upstream off;
        }

        location /stock/ {
            rewrite ^/stock/(.*)$ /$1 break;
            proxy_pass http://stock_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            proxy_next_upstream off;
        }

        location @checkout_unavailable {
            return 408 "Checkout backend unavailable";
        }

        access_log off;
    }

    access_log off;
}
