# Automatically choose one worker process per CPU core.
worker_processes auto;
# Raise the open file descriptor limit for high connection counts.
worker_rlimit_nofile 65536;

events {
    # Maximum simultaneous connections handled by each worker.
    worker_connections 16384;
    # Accept as many queued connections as possible per event loop tick.
    multi_accept on;
}

http {
    # Docker internal DNS resolver; useful when service IPs change.
    resolver 127.0.0.11 valid=5s ipv6=off;
    # Keep client connections alive briefly to reduce reconnect overhead.
    keepalive_timeout 30s;
    # Cap requests per keep-alive connection before recycling it.
    keepalive_requests 10000;

    # Load-balanced backend pool for the orchestrator replicas (internal only).
    upstream orchestrator_service_upstream {
        least_conn;
        server orchestrator-service:5000 max_fails=1 fail_timeout=5s;
        server orchestrator-service-2:5000 max_fails=1 fail_timeout=5s;
        keepalive 64;
    }

    # Load-balanced backend pool for the order service replicas.
    upstream order_service_upstream {
        # Route requests to the replica with the fewest active connections.
        least_conn;
        # Order service replicas exposed on port 5000.
        server order-service:5000;
        server order-service-2:5000;
        server order-service-3:5000;
        server order-service-4:5000;
        server order-service-5:5000;
        server order-service-6:5000;
        # Reuse idle upstream connections for better throughput.
        keepalive 128;
    }

    # Load-balanced backend pool for the payment service replicas.
    upstream payment_service_upstream {
        least_conn;
        # Payment service replicas exposed on port 5000.
        server payment-service:5000;
        server payment-service-2:5000;
        server payment-service-3:5000;
        server payment-service-4:5000;
        server payment-service-5:5000;
        server payment-service-6:5000;
        server payment-service-7:5000;
        keepalive 128;
    }

    # Load-balanced backend pool for the stock service replicas.
    upstream stock_service_upstream {
        least_conn;
        # Stock service replicas exposed on port 5000.
        server stock-service:5000;
        server stock-service-2:5000;
        server stock-service-3:5000;
        server stock-service-4:5000;
        server stock-service-5:5000;
        server stock-service-6:5000;
        server stock-service-7:5000;
        keepalive 128;
    }

    server {
        # Expose the gateway on HTTP port 80.
        listen 80;

        location /orchestrator/ {
            # Internal path used by order-service replicas to reach the
            # orchestrator without hardcoding a single container name.
            proxy_pass http://orchestrator_service_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            # Safe to retry: orchestrator start_checkout is idempotent and
            # collapses duplicates using durable active_tx state.
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;
        }

        location /orders/checkout/ {
            # Keep the longer timeout for long-lived checkout requests, but let
            # nginx reuse upstream sockets so sustained load does not exhaust
            # local ephemeral ports in the gateway.
            proxy_pass http://order_service_upstream/checkout/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 90s;
            proxy_next_upstream off;
        }

        location /orders/ {
            # Forward request while stripping the /orders/ prefix.
            proxy_pass http://order_service_upstream/;
            # Use HTTP/1.1 for upstream compatibility.
            proxy_http_version 1.1;
            # Forward original host header from client request.
            proxy_set_header Host $host;
            # Keep upstream connections reusable instead of forcing close.
            proxy_set_header Connection "";
            # Timeout while connecting to selected upstream replica.
            proxy_connect_timeout 10s;
            # Timeout for sending request data to upstream.
            proxy_send_timeout 30s;
            # Timeout waiting for upstream response data.
            proxy_read_timeout 60s;
            # Avoid retry amplification for non-idempotent API requests.
            proxy_next_upstream off;
        }

        location /payment/ {
            # Forward request while stripping the /payment/ prefix.
            proxy_pass http://payment_service_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            proxy_next_upstream off;
        }

        location /stock/ {
            # Forward request while stripping the /stock/ prefix.
            proxy_pass http://stock_service_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            proxy_next_upstream off;
        }

        # Disable server-level access logs to reduce logging overhead.
        access_log off;
    }

    # Disable HTTP-level default access logs globally.
    access_log off;
}
